# Alembic — configuración de migraciones
# Ejecutar desde la raíz del proyecto:
#   alembic upgrade head
#   alembic revision --autogenerate -m "descripcion"

[alembic]
# La URL se sobreescribe en env.py con la de settings.
# Dejar en blanco aquí para que no haya conflictos.
sqlalchemy.url =

script_location = alembic

file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
